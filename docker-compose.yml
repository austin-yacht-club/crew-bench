services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: crewbench
      POSTGRES_PASSWORD: crewbench_secret
      POSTGRES_DB: crewbench
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewbench"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql://crewbench:crewbench_secret@db:5432/crewbench
      SECRET_KEY: your-secret-key-change-in-production
      ADMIN_EMAIL: admin@crewbench.app
      ADMIN_PASSWORD: admin123
      PUBLIC_URL: http://localhost:3333
      ROOT_PATH: /api
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin /api when behind reverse proxy (set to full URL if API is on another host)
        REACT_APP_API_URL: ""
        # REACT_APP_RECAPTCHA_SITE_KEY: ""  # optional, for reCAPTCHA
    ports:
      - "3333:80"
    depends_on:
      - backend

