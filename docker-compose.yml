services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: crewbench
      POSTGRES_PASSWORD: crewbench_secret
      POSTGRES_DB: crewbench
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewbench"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://crewbench:crewbench_secret@db:5432/crewbench
      SECRET_KEY: your-secret-key-change-in-production
      ADMIN_EMAIL: admin@crewbench.app
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
